display_name: Movo Video Generator
short_description: Generate Movo videos from prompts or reference images.
default_prompt: Help me choose the right Movo template or veo3.1 mode, confirm the plan, run the real request, and keep the workflow synchronous and explicit. After submission, return the real task id immediately. Use `status` for a single follow-up check and `poll` only when the user explicitly asks to wait in the current turn. Do not promise background completion notifications or use detached watchers.
